<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>امتحانات مقدمة في الاقتصاد | ObourCS Hub</title>
    <!-- Google Fonts for modern text -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../index.css?v=2">
    <link rel="icon" type="image/png" href="../../icon-512.png?v=2">
    <style>
        .file-list {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .file-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 2rem;
            background: rgba(20, 22, 30, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: var(--text-main);
        }

        .file-card:hover {
            transform: translateX(-10px);
            background: rgba(40, 44, 60, 0.6);
            border-color: rgba(76, 201, 240, 0.4);
            box-shadow: 0 10px 25px rgba(76, 201, 240, 0.15);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .file-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .file-icon svg {
            width: 24px;
            height: 24px;
        }

        .file-details h3 {
            font-size: 1.2rem;
            margin-bottom: 0.3rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        .file-details p {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 0;
        }

        .download-btn {
            background: rgba(76, 201, 240, 0.1);
            color: var(--secondary);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .file-card:hover .download-btn {
            background: var(--secondary);
            color: #000;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
            font-weight: 600;
        }

        .back-link:hover {
            color: var(--text-main);
        }
    </style>
</head>

<body>
    <!-- Background Animated Shapes from main CSS -->
    <div class="background-elements">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
    </div>

    <!-- Navbar -->
    <nav class="glass-nav">
        <div class="logo" dir="ltr">
            <a href="../../index.html"
                style="text-decoration: none; color: inherit; display: flex; gap: 0.5rem; align-items: center;">
                <span class="en-logo">ObourCS</span>
                <span class="ar-logo">Hub</span>
            </a>
        </div>
    </nav>

    <main class="section-padding">
        <div style="max-width: 800px; margin: 0 auto;">
            <a href="../../index.html#subjects" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                الرجوع للمواد
            </a>

            <div class="section-header" style="text-align: right; margin-bottom: 3rem;">
                <h2 class="section-title" style="font-size: 2.2rem;">امتحانات <span class="gradient-text">مقدمة في الاقتصاد</span></h2>
                <p class="section-subtitle" style="margin: 0;">(Introduction to Economics)</p>
            </div>

            <div class="file-list">
                <div style="text-align: center; padding: 3rem 1rem;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; opacity: 0.5;">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                        <polyline points="13 2 13 9 20 9"></polyline>
                    </svg>
                    <p style="color: var(--text-muted); font-size: 1.1rem; margin: 0;">لا توجد امتحانات متاحة حالياً لهذه المادة.</p>
                </div>

            </div>
        </div>
    </main>

    <!-- We're also reusing the app.js script for space icons -->
    <script src="../../app.js"></script>
</body>

</html>
